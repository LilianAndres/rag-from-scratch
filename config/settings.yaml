resolvers:
  local:
    base_path: /tmp

loaders:
  pdf:
    page_separator: "\n"

embedder:
  provider: huggingface
  huggingface:
    model: BAAI/bge-small-en-v1.5
    batch_size: 64

vectorstore:
  provider: chroma
  chroma:
    persist_directory: .chroma
    collection_name: rag_collection
    distance_function: cosine

retriever:
  provider: hybrid
  vector:
    top_k: 5
    score_threshold: null
  bm25:
    top_k: 5
  hybrid:
    top_k: 5
    fetch_k: 20