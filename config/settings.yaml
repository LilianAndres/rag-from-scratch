resolvers:
  local:
    base_path: /tmp

loaders:
  pdf:
    page_separator: "\n"

embedder:
  provider: huggingface
  huggingface:
    model: BAAI/bge-small-en-v1.5
    batch_size: 64

backend:
  type: hybrid
  hybrid:
    rrf_k: 60
    backends:
      - type: chroma
        chroma:
          host: localhost
          port: 8000
          collection_name: documents

      - type: elk
        elk:
          hosts: ["http://localhost:9200"]
          index_name: documents

generator:
  provider: ollama
  prompts_dir: src/prompts
  ollama:
    model: llama3
    base_url: http://localhost:11434
    temperature: 0.0
    max_tokens: 1024
    prompt_template: rag.j2
    timeout: 120.0