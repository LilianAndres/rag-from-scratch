resolvers:
  local:
    base_path: /tmp

loaders:
  pdf:
    page_separator: "\n"

embedder:
  provider: huggingface
  huggingface:
    model: BAAI/bge-small-en-v1.5
    batch_size: 64

backend:
  type: hybrid
  hybrid:
    rrf_k: 60
    backends:
      - type: chroma
        chroma:
          host: localhost
          port: 8000
          collection_name: documents

      - type: elk
        elk:
          hosts: ["http://localhost:9200"]
          index_name: documents