resolvers:
  local:
    base_path: /tmp

loaders:
  pdf:
    page_separator: "\n"

embedder:
  provider: huggingface
  huggingface:
    model: BAAI/bge-small-en-v1.5
    batch_size: 64

backend:
  type: hybrid
  hybrid:
    rrf_k: 60
    backends:
      - type: chroma
        chroma:
          host: localhost
          port: 8000
          collection_name: documents
      - type: elk
        elk:
          hosts: ["http://localhost:9200"]
          index_name: documents

reranker:
  enabled: false
  provider: cross-encoder
  cross_encoder:
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_n: null  # return all chunks reordered, let the generator decide

llms:
  profiles:
    fast:
      provider: ollama
      ollama:
        model: llama3:8b
        base_url: http://localhost:11434
        temperature: 0.0
        max_tokens: 512
        timeout: 120.0

generator:
  llm_profile: fast
  prompts_dir: src/prompts
  prompt_template: rag.j2

query_transformer:
  enabled: false
  provider: multi-query
  llm_profile: fast
  prompts_dir: src/prompts
  multi_query:
    n_variants: 3
    prompt_template: multi_query.j2