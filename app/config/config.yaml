providers:
  ollama:
    base_url: "http://localhost:11434"
  infinity:
    base_url: "http://localhost:7997"

llms:
  profiles:
    fast:
      provider: ollama
      ollama:
        model: llama3:8b
        temperature: 0.0
        max_tokens: 512
        timeout: 360.0

resolvers:
  local:
    base_path: /tmp

loaders:
  pdf:
    page_separator: "\n"

chunker:
  provider: recursive
  recursive:
    chunk_size: 800
    chunk_overlap: 100
    separators: null

embedder:
  provider: infinity
  infinity:
    model: BAAI/bge-small-en-v1.5
    timeout: 60.0

backend:
  type: chroma
  chroma:
    host: localhost
    port: 8000
    collection_name: documents
    distance_function: cosine

reranker:
  enabled: true
  provider: infinity
  infinity:
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_n: 5
    timeout: 60.0

generator:
  llm_profile: fast
  prompts_dir: app/src/prompts
  prompt_template: rag.j2

query_transformer:
  enabled: false
  provider: multi-query
  llm_profile: fast
  prompts_dir: app/src/prompts
  multi_query:
    n_variants: 3
    prompt_template: multi_query.j2