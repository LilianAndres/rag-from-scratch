dataset_path: /tmp/data/questions.yaml
results_dir: /tmp/data/results
batch_size: 5

top_k: 5

providers:
  ollama:
    base_url: "http://localhost:11434"
  infinity:
    base_url: "http://localhost:7997"

judge_llm:
  provider: ollama
  ollama:
    model: llama3:8b

judge_embeddings:
  provider: infinity
  infinity:
    model: BAAI/bge-small-en-v1.5

metrics:
  - name: faithfulness
  - name: answer_relevancy
  - name: context_recall
  - name: factual_correctness
  - name: latency
    params:
      threshold_ms: 2000.0

reporters:
  - json